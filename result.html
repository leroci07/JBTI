const urlParams = new URLSearchParams(window.location.search);
const score = parseInt(urlParams.get("score"));
let currentLang = urlParams.get('lang') || 'zh';

const res = list.find(item => score >= item.min && score <= item.max);

const topTitle = document.getElementById("topTitle");
const nameEl = document.getElementById("name");
const tagEl = document.getElementById("tag");
const descEl = document.getElementById("desc");
const personalityImage = document.getElementById("personalityImage");
const cupImage = document.getElementById("cupImage");
const actionBtn = document.getElementById("actionBtn");
const langBtn = document.getElementById("langBtn");
const zhText = document.getElementById("zhText");
const enText = document.getElementById("enText");

function updateLangBtn() {
  if (currentLang === "zh") {
    zhText.className = "lang-zh lang-active";
    enText.className = "lang-en lang-inactive";
  } else {
    zhText.className = "lang-zh lang-inactive";
    enText.className = "lang-en lang-active";
  }
}

function render() {
  const dict = i18n[currentLang];
  topTitle.innerText = dict.topTitle;
  actionBtn.innerText = dict.btn;

  if (currentLang === "zh") {
    nameEl.innerText = res.name;
    tagEl.innerText = res.tag;
    descEl.innerText = res.desc;
  } else {
    nameEl.innerText = res.enName;
    tagEl.innerText = res.enTag;
    descEl.innerText = res.enDesc;
  }
  
  personalityImage.src = res.personalityImg;
  cupImage.src = res.cupImg;
  
  updateLangBtn();
}

langBtn.addEventListener("click", () => {
  currentLang = currentLang === "zh" ? "en" : "zh";
  render();
});
